<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Furtravel - Pet Travel Log</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0D151A; color: #f5f0e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-align: center; padding: 40px 20px; box-sizing: border-box;
  }
  .card { max-width: 560px; }
  h1 { font-size: 2.2rem; margin-bottom: 0.4em; color: #E8A83D; }
  p { font-size: 1.05rem; line-height: 1.6; opacity: 0.9; }
  .feature { margin-top: 2em; padding: 1.2em; border: 1px solid #E8A83D66; border-radius: 14px; }
  .price { margin-top: 1.5em; font-weight: 600; color: #E8A83D; }
  footer { margin-top: 3em; font-size: 0.85rem; opacity: 0.6; }
  a { color: #E8A83D; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E8A83D55 0%, #E8A83D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="card">
    <h1>Furtravel</h1>
    <p>Track pet-friendly trips, including documents needed and how your pet handled travel.</p>
    <div class="feature">
      <strong>Free:</strong> Log trip destination and dates<br>
      <strong>Pro:</strong> Travel checklist generator with pet-specific document reminders
    </div>
    <p class="price">Pro — $2.99 one-time</p>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
